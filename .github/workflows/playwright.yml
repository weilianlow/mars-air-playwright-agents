name: "Playwright Tests"

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: npm ci

    - name: Create CTRF report directory
      run: mkdir -p playwright-report/ctrf

    - name: Run Playwright tests
      run: npx playwright test

    - name: Verify CTRF JSON report generated
      run: |
        REPORT_PATH=playwright-report/ctrf/ctrf-report.json
        if [ ! -f "$REPORT_PATH" ]; then
          echo "Expected report not found: $REPORT_PATH"
          ls -R playwright-report || true
          exit 1
        fi
        echo "Found CTRF JSON report at $REPORT_PATH"

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v4

    - name: Upload report to GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report

    - name: Deploy Playwright report to GitHub Pages
      id: deploy-pages
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Show GitHub Pages report URL
      run: |
        echo "Playwright report deployed to: ${{ steps.deploy-pages.outputs.page_url }}"

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/**
        retention-days: 1
